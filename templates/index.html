<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Concierge · CrewAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="/static/img/crewai-logo.png" type="image/png" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="header-logo">
          <img src="/static/img/crewai-logo.png" alt="CrewAI" class="logo-img logo-header" />
          <h1>Flight Concierge</h1>
        </div>
        <span class="header-badge">
          <img src="/static/img/crewai-logo.png" alt="" class="logo-img logo-badge" />
          CrewAI AMP
        </span>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="welcome">
        <img src="/static/img/crewai-logo.png" alt="CrewAI" class="welcome-icon" />
        <p class="welcome-title">Where would you like to fly?</p>
        <p class="welcome-subtitle">Tell me your departure city, destination, and travel dates and I'll find the best flights for you.</p>
      </div>
    </main>

    <div class="feedback-bar" id="feedbackBar">
      <p class="feedback-prompt" id="feedbackPrompt"></p>
      <div class="feedback-actions">
        <textarea class="feedback-input" id="feedbackInput" rows="2" placeholder="Add details or just approve..."></textarea>
        <div class="feedback-buttons">
          <button class="btn btn-approve" id="btnApprove">Approve</button>
          <button class="btn btn-change" id="btnChange">Request Changes</button>
        </div>
      </div>
    </div>

    <form class="input-bar" id="inputForm">
      <input
        type="text"
        class="message-input"
        id="messageInput"
        placeholder="e.g. I want to fly from New York to London in 3 days..."
        autocomplete="off"
      />
      <button type="submit" class="btn btn-send" id="btnSend">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </form>

    <footer class="footer">
      Powered by
      <img src="/static/img/crewai-logo.png" alt="" class="logo-img logo-footer" />
      <a href="https://www.crewai.com/amp" target="_blank" rel="noopener">CrewAI AMP</a>
    </footer>
  </div>

  <div class="warmup-overlay" id="warmupOverlay">
    <img src="/static/img/crewai-logo.png" alt="CrewAI" class="warmup-logo" />
    <div class="warmup-spinner"></div>
    <p class="warmup-text">Connecting to CrewAI AMP...</p>
  </div>

  <div class="modal-overlay" id="errorModal">
    <div class="modal">
      <svg class="modal-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
        <path d="M12 8v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1" fill="currentColor"/>
      </svg>
      <p class="modal-text" id="errorModalText"></p>
      <button class="btn btn-modal-dismiss" id="errorModalBtn">Try Again</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="/static/js/chat.js?v=8"></script>
</body>
</html>
